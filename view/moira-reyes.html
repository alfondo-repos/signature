<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firma — Moira Reyes</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      margin: 40px;
      color: #333;
    }
    .hint {
      margin-top: 32px;
      padding: 16px 20px;
      background: #FFFBF5;
      border: 1px solid #E8DFD0;
      border-radius: 6px;
      font-size: 13px;
      color: #6B5B4F;
      max-width: 480px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<!-- Firma Alfondo — Moira Reyes -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; color: #3D3D3D; max-width: 480px;">
  <tr>
    <td style="padding: 0 18px 0 0; vertical-align: top;">
      <img
        src="https://alfondo.cl/team/moira-3.png"
        alt="Moira Reyes"
        width="72"
        height="72"
        style="display: block; border-radius: 50%; border: 0; object-fit: cover;"
      />
    </td>
    <td style="vertical-align: top; border-left: 2px solid #D4837A; padding: 0 0 0 18px;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="padding: 0 0 1px 0;">
            <span style="font-size: 17px; font-weight: 600; color: #1A1F2E; letter-spacing: -0.3px;">
              Moira Reyes
            </span>
          </td>
        </tr>
        <tr>
          <td style="padding: 0 0 10px 0;">
            <span style="font-size: 13px; color: #1A1F2E; font-weight: 500;">
              Gestora de Operaciones Comerciales
            </span>
          </td>
        </tr>
        <tr>
          <td style="padding: 0 0 14px 0;">
            <a href="https://alfondo.cl" style="color: #D4837A; text-decoration: none; font-size: 13px; line-height: 13px;">
              alfondo.cl
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding: 0;">
            <a href="https://alfondo.cl" style="text-decoration: none;">
              <img
                src="https://alfondo.cl/logo-negro-sinfondo.png"
                alt="alfondo"
                width="100"
                height="auto"
                style="display: block; border: 0;"
              />
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

  <p class="hint">
    <strong>Para Gmail:</strong> selecciona la firma de arriba (Cmd+A o arrastra con el mouse) → copia (Cmd+C) → pega en Gmail → Configuración → Firma.
  </p>
</body>
</html>
