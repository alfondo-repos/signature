<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firma — Moira</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      margin: 40px;
      color: #333;
    }
    button {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #1A1F2E;
      background: #1A1F2E;
      color: #fff;
      margin-bottom: 24px;
    }
    button:hover { opacity: 0.88; }
    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: #888;
      max-width: 480px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <button type="button" onclick="copySignature()">Copiar firma</button>
  <div id="signature">
<!-- Firma Funder — Moira -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; color: #3D3D3D; max-width: 480px;">
  <tr>
    <td style="padding: 0 18px 0 0; vertical-align: top;">
      <img
        src="https://alfondo.cl/team/moira-3.png"
        alt="Moira"
        width="72"
        height="72"
        style="display: block; border-radius: 50%; border: 0; object-fit: cover;"
      />
    </td>
    <td style="vertical-align: top; border-left: 2px solid #046AFF; padding: 0 0 0 18px;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="padding: 0 0 1px 0;">
            <span style="font-size: 17px; font-weight: 600; color: #1A1F2E; letter-spacing: -0.3px;">
              Moira
            </span>
          </td>
        </tr>
        <tr>
          <td style="padding: 0 0 10px 0;">
            <span style="font-size: 13px; color: #1A1F2E; font-weight: 500;">
              Success Manager
            </span>
          </td>
        </tr>
        <tr>
          <td style="padding: 0 0 14px 0;">
            <a href="https://www.funder.cl" style="color: #046AFF; text-decoration: none; font-size: 13px; line-height: 13px;">
              funder.cl
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding: 0;">
            <a href="https://www.funder.cl" style="text-decoration: none;">
              <img
                src="https://alfondo-repos.github.io/signature/assets/funder-logo.png"
                alt="funder"
                width="90"
                height="auto"
                style="display: block; border: 0;"
              />
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

  </div>
  <p class="hint">Pega en Gmail → Configuración → Firma con Cmd+V</p>
  <script>
    function copySignature() {
      const el = document.getElementById('signature');
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand('copy');
      sel.removeAllRanges();
    }
  </script>
</body>
</html>
